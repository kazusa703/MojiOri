name: MojiOri
options:
  bundleIdPrefix: com.imaiissatsu
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
  defaultConfig: Release
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    DEVELOPMENT_TEAM: WM7939G226
    INFOPLIST_KEY_CFBundleDisplayName: "MojiOri - 文字アート＆ロゴメーカー"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.graphics-design"
    GENERATE_INFOPLIST_FILE: true
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Save your artwork to the photo library"

targets:
  MojiOri:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Resources/**"
      - path: Sources/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imaiissatsu.mojiori
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  MojiOriTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: MojiOri
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imaiissatsu.mojiori.tests
